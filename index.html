<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hartalega ITSD - Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
        body { background: #0a1628; font-family: 'Inter', sans-serif; color: #e8eaf0; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hrt-grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,190,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,190,0,0.03) 1px, transparent 1px), radial-gradient(circle at center, rgba(10,22,40,0.85) 0%, rgba(10,22,40,0.65) 100%); background-size: 48px 48px, 48px 48px, cover; pointer-events: none; z-index: -2; }
        .hrt-glow { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 800px; height: 400px; background: radial-gradient(ellipse, rgba(255,190,0,0.06) 0%, transparent 70%); pointer-events: none; z-index: -1; }
        .hrt-header { width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,190,0,0.15); background: rgba(10,22,40,0.8); backdrop-filter: blur(8px); z-index: 50; }
        .hrt-logo-area { display: flex; align-items: center; gap: 14px; }
        .hrt-logo-badge { width: 42px; height: 42px; border: 2px solid #FFBE00; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(255,190,0,0.08); }
        .hrt-logo-badge svg { width: 24px; height: 24px; }
        .hrt-logo-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 1px; color: #FFBE00; line-height: 1.1; }
        .hrt-logo-sub { font-size: 10px; color: rgba(255,190,0,0.6); letter-spacing: 2px; font-weight: 400; text-transform: uppercase; }
        .container { background: rgba(20, 36, 65, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,190,0,0.2); padding: 40px; border-radius: 12px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); width: 90%; max-width: 400px; text-align: center; box-sizing: border-box; margin-bottom: 40px; }
        .dashboard-container { max-width: 1000px; text-align: left; padding: 30px;}
        h2, h3 { font-family: 'Rajdhani', sans-serif; margin-top: 0; color: #e8eaf0; letter-spacing: 1px; text-transform: uppercase;}
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: rgba(232,234,240,0.6); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; box-sizing: border-box; font-size: 16px; background: rgba(10,22,40,0.6); border: 1px solid rgba(255,190,0,0.3); color: #FFBE00; font-family: 'Rajdhani', sans-serif; font-weight: 600; border-radius: 6px; outline: none; }
        .input-group select option { background: #0a1628; color: #FFBE00; }
        button { width: 100%; padding: 12px; font-size: 16px; font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background-color: #FFBE00; color: #0a1628; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        button:hover { background-color: #ffce33; box-shadow: 0 0 15px rgba(255,190,0,0.4); }
        button:disabled { background-color: rgba(255,190,0,0.3); cursor: not-allowed; color: rgba(232,234,240,0.5); box-shadow: none;}
        .btn-danger { background-color: rgba(239, 68, 68, 0.8); color: white; width: auto; padding: 8px 16px; font-size: 14px;}
        .btn-success { background-color: rgba(16, 185, 129, 0.8); color: white; width: auto; padding: 8px 16px; font-size: 14px;}
        .btn-secondary { background-color: rgba(30, 50, 85, 0.8); color: white; width: auto; padding: 8px 16px; font-size: 14px; border: 1px solid rgba(255,190,0,0.2);}
        .error-message { color: #ef4444; margin-top: 15px; font-size: 14px; display: none; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 4px; border: 1px solid rgba(239,68,68,0.3);}
        .toggle-link { margin-top: 20px; font-size: 14px; color: #FFBE00; cursor: pointer; display: inline-block; font-weight: 500;}
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; font-size: 13px; border: 1px solid rgba(255,190,0,0.15); border-radius: 8px; overflow: hidden;}
        th, td { padding: 12px 15px; border-bottom: 1px solid rgba(255,190,0,0.1); text-align: left; vertical-align: middle; }
        th { background-color: rgba(30, 50, 85, 0.6); color: rgba(232,234,240,0.8); font-family: 'Rajdhani', sans-serif; font-size: 14px; text-transform: uppercase;}
        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background-color: rgba(255,190,0,0.03); }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; text-transform: uppercase;}
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #FFBE00; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-approved { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-progress { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-closed { background: rgba(232, 234, 240, 0.1); color: #e8eaf0; border: 1px solid rgba(232, 234, 240, 0.3); }
        .meta-text { font-size: 11px; color: rgba(232,234,240,0.5); display: block; margin-top: 4px; }
        #registerArea, #dashboardArea { display: none; }
    </style>
</head>
<body>

    <div class="hrt-grid-bg"></div><div class="hrt-glow"></div>

    <nav class="hrt-header">
        <div class="hrt-logo-area">
            <div class="hrt-logo-badge">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="14" width="6" height="14" rx="1" fill="#FFBE00"/><rect x="13" y="8" width="6" height="20" rx="1" fill="#FFBE00"/><rect x="22" y="4" width="6" height="24" rx="1" fill="#FFBE00" opacity="0.7"/></svg>
            </div>
            <div><div class="hrt-logo-text">HARTALEGA</div><div class="hrt-logo-sub">ITSD Portal</div></div>
        </div>
    </nav>

    <!-- LOGIN & REGISTER -->
    <div class="container" id="loginArea">
        <h2>System Login</h2>
        <form id="loginForm">
            <div class="input-group"><label>Employee ID</label><input type="text" id="loginUserID" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="loginPassword" required></div>
            <button type="submit" id="loginBtn">Initialize Access</button>
            <div id="loginError" class="error-message"></div>
        </form>
        <span class="toggle-link" onclick="toggleView('register')">New User? Request Access Here.</span>
    </div>

    <div class="container" id="registerArea">
        <h2>Register Account</h2>
        <form id="registerForm">
            <div class="input-group"><label>Employee ID</label><input type="text" id="regUserID" required></div>
            <div class="input-group"><label>Full Name</label><input type="text" id="regName" required></div>
            <div class="input-group"><label>Email</label><input type="email" id="regEmail" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="regPassword" required></div>
            <button type="submit" id="registerBtn">Submit Registration</button>
            <div id="registerError" class="error-message"></div>
        </form>
        <span class="toggle-link" onclick="toggleView('login')">Return to Login</span>
    </div>

    <!-- STANDARD USER DASHBOARD -->
    <div class="container dashboard-container" id="dashboardArea">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,190,0,0.15); padding-bottom: 15px; margin-bottom: 20px;">
            <div><h2 id="welcomeMessage" style="margin: 0; color: #FFBE00;">Welcome!</h2><p style="margin: 5px 0 0 0; color: rgba(232,234,240,0.6); font-size: 14px; font-family: 'Rajdhani'; letter-spacing: 1px; text-transform: uppercase;">Role: <strong id="userRoleDisplay" style="color: #e8eaf0;"></strong></p></div>
            <button onclick="logout()" class="btn-secondary" style="width: auto;">Terminate Session</button>
        </div>

        <div style="background: rgba(30, 50, 85, 0.4); padding: 25px; border-radius: 8px; border: 1px solid rgba(255,190,0,0.15); margin-bottom: 40px;">
            <h3 style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #FFBE00;"></span>Raise a New Request</h3>
            <form id="requestForm">
                <div class="input-group"><label>Request Classification</label><select id="reqType" required><option value="">Select classification...</option><option value="New Project">New Project Initiative</option><option value="System Modification">System Modification</option></select></div>
                <div class="input-group"><label>Requirement Details</label><textarea id="reqDesc" required rows="2"></textarea></div>
                <button type="submit" id="submitReqBtn" class="btn-success">Submit Ticket</button>
                <div id="reqMessage" style="margin-top: 15px; font-size: 14px; font-weight: bold; display: none; padding: 10px; background: rgba(16, 185, 129, 0.1);"></div>
            </form>
        </div>

        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="tableTitle" style="margin: 0; display: flex; align-items: center; gap: 8px;">My Data</h3>
                <button onclick="loadTickets()" class="btn-secondary">Sync Data</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr id="tableHeaderRow"><th width="10%">ID</th><th width="15%">Classification</th><th width="30%">Description</th><th width="15%">Status</th><th width="15%">Lifecycle Trace</th></tr></thead>
                    <tbody id="ticketTableBody"><tr><td colspan="6" style="text-align: center;">Initializing datalink...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyTIu6rx3oOcARzFQTvytVbrSIj4hx3hrv5sNR_cfHANz25Dm4WLIV7RzyhcH8GUA3F/exec"; 

        function toggleView(view) {
            ['login', 'register', 'dashboard'].forEach(v => document.getElementById(v + 'Area').style.display = 'none');
            document.getElementById('loginError').style.display = 'none'; document.getElementById('registerError').style.display = 'none';
            document.getElementById(view + 'Area').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('loginBtn'); const err = document.getElementById('loginError');
            btn.disabled = true; err.style.display = "none";
            try { const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", userID: document.getElementById('loginUserID').value, password: document.getElementById('loginPassword').value }) });
                const data = await res.json(); 
                if (data.success) {
                    sessionStorage.setItem('itsd_user', JSON.stringify(data.user));
                    // SECURITY REDIRECT: Send Admins to the Admin page
                    if (data.user.role === 'Admin') { window.location.href = 'admin.html'; } 
                    else { setupDashboard(data.user); }
                } else { err.innerText = data.message; err.style.display = "block"; }
            } catch (error) { err.innerText = "Network link failure."; err.style.display = "block"; } finally { btn.disabled = false; }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('registerBtn'); const err = document.getElementById('registerError');
            btn.disabled = true; err.style.display = "none";
            try { const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "register", userID: document.getElementById('regUserID').value, name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value }) });
                const data = await res.json(); 
                if (data.success) { 
                    sessionStorage.setItem('itsd_user', JSON.stringify(data.user));
                    document.getElementById('registerForm').reset(); setupDashboard(data.user); 
                } else { err.innerText = data.message; err.style.display = "block"; }
            } catch (error) { err.innerText = "Network link failure."; err.style.display = "block"; } finally { btn.disabled = false; }
        });

        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('submitReqBtn'); const msg = document.getElementById('reqMessage');
            btn.disabled = true; msg.style.display = "none"; const user = JSON.parse(sessionStorage.getItem('itsd_user'));
            try { const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "new_request", submitterID: user.userID, type: document.getElementById('reqType').value, description: document.getElementById('reqDesc').value }) });
                const data = await res.json(); if (data.success) { msg.innerText = "Ticket initialized!"; msg.style.display = "block"; document.getElementById('requestForm').reset(); loadTickets(); } else { msg.innerText = "Failed."; msg.style.display = "block"; }
            } catch (error) { msg.innerText = "Network link failure."; msg.style.display = "block"; } finally { btn.disabled = false; }
        });

        async function loadTickets() {
            const tbody = document.getElementById('ticketTableBody'); const headerRow = document.getElementById('tableHeaderRow');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: rgba(232,234,240,0.5);">Syncing database...</td></tr>';
            const user = JSON.parse(sessionStorage.getItem('itsd_user')); if (!user) return; 
            
            if (user.role === 'Executor') document.getElementById('tableTitle').innerHTML = '<span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981;"></span> Task Pool';
            
            if (user.role === 'Executor' && headerRow.cells.length === 5) { const th = document.createElement('th'); th.width = "15%"; th.innerText = "System Actions"; headerRow.appendChild(th); }
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "get_tickets", userID: user.userID, role: user.role }) });
                const result = await res.json();
                
                if (result.success) {
                    tbody.innerHTML = '';
                    if (result.tickets.length === 0) { tbody.innerHTML = `<tr><td colspan="${user.role === 'Executor' ? '6' : '5'}" style="text-align: center;">No records.</td></tr>`; return; }
                    
                    result.tickets.reverse().forEach(ticket => {
                        let badgeClass = "status-pending";
                        if(ticket.status === "Approved") badgeClass = "status-approved";
                        if(ticket.status === "In Progress") badgeClass = "status-progress";
                        if(ticket.status === "Closed") badgeClass = "status-closed";

                        let meta = "";
                        if (ticket.dateSubmitted) meta += `<span class="meta-text">INIT: ${ticket.dateSubmitted}</span>`;
                        if (ticket.approverName) meta += `<span class="meta-text">AUTH: ${ticket.approverName} [${ticket.dateApproved}]</span>`;
                        if (ticket.assignedTo) meta += `<span class="meta-text">EXEC: ${ticket.assignedTo} [${ticket.dateAssigned}]</span>`;
                        if (ticket.dateCompleted) meta += `<span class="meta-text">TERM: ${ticket.dateCompleted}</span>`;

                        let rowHTML = `<tr><td><strong style="color: #FFBE00;">${ticket.ticketID}</strong></td><td>${ticket.type}</td><td>${ticket.description}</td><td><span class="status-badge ${badgeClass}">${ticket.status}</span></td><td>${meta || '-'}</td>`;

                        if (user.role === 'Executor') {
                            let actionBtn = `<span class="meta-text">LOCKED</span>`;
                            if (ticket.status === "In Progress") actionBtn = `<button class="btn-danger" onclick="executeUpdate('${ticket.ticketID}', 'close')">Close</button>`;
                            rowHTML += `<td>${actionBtn}</td>`;
                        }
                        tbody.innerHTML += rowHTML + "</tr>";
                    });
                }
            } catch (error) { tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #ef4444;">Datalink error.</td></tr>`; }
        }

        async function executeUpdate(ticketID, actionType) {
            const user = JSON.parse(sessionStorage.getItem('itsd_user'));
            const payload = { action: "update_ticket", ticketID: ticketID, updateType: actionType };
            try { await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) }); loadTickets(); } catch (e) { alert("Network Error"); }
        }

        function setupDashboard(user) { toggleView('dashboard'); document.getElementById('welcomeMessage').innerText = "Welcome, " + user.name; document.getElementById('userRoleDisplay').innerText = user.role; loadTickets(); }
        function logout() { sessionStorage.removeItem('itsd_user'); document.getElementById('loginForm').reset(); toggleView('login'); }
        
        window.onload = () => { 
            const userStr = sessionStorage.getItem('itsd_user'); 
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.role === 'Admin') { window.location.href = 'admin.html'; } else { setupDashboard(user); }
            } else { toggleView('login'); }
        };
    </script>
</body>
</html>
